name: IETF Draft
on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/ietf-draft.yaml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/ietf-draft.yaml"

# Read is enough for pull requests; on push to main the job opens a pull request
# with the regenerated outputs (main is protected and cannot be pushed to
# directly), which needs contents and pull-requests write.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tooling
        run: |
          gem install kramdown-rfc
          pip3 install xml2rfc

      - name: Build draft
        run: make -C docs compile

      - name: Upload rendered draft
        uses: actions/upload-artifact@v7
        with:
          name: draft
          path: |
            docs/draft-justo-goe2ee-latest.txt
            docs/draft-justo-goe2ee-latest.html
          if-no-files-found: error

      # Publish the freshly rendered draft to GitHub Pages. Only on push to
      # main: stage the outputs into a site directory (the HTML doubles as
      # index.html so the site root serves the draft) and hand it to the deploy
      # job below as a Pages artifact. This deploys the just-built HTML, not the
      # committed copy, so Pages never lags behind the source .md.
      - name: Stage site for GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p _site
          cp docs/draft-justo-goe2ee-latest.html _site/index.html
          cp docs/draft-justo-goe2ee-latest.html _site/
          cp docs/draft-justo-goe2ee-latest.txt _site/
          cp docs/draft-justo-goe2ee-latest.xml _site/

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      # main is a protected branch (PR + verified signatures required), so the
      # regenerated outputs cannot be pushed to it directly. Instead open (or
      # update) a pull request from a fixed branch. This only runs on push to
      # main; the pull request it opens fires a pull_request event that runs the
      # build/upload steps above but skips this one, so it never recurses.
      # sign-commits makes the commit verified, satisfying branch protection.
      - name: Open pull request with regenerated outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            docs/draft-justo-goe2ee-latest.xml
            docs/draft-justo-goe2ee-latest.txt
            docs/draft-justo-goe2ee-latest.html
          branch: chore/regenerate-draft
          delete-branch: true
          sign-commits: true
          commit-message: "docs: regenerate rendered draft"
          title: "docs: regenerate rendered draft"
          body: |
            Automated regeneration of the rendered Internet-Draft
            (`.xml`/`.txt`/`.html`) from `draft-justo-goe2ee-latest.md`.

  # Deploy the staged site (uploaded by the build job) to GitHub Pages. Runs
  # only on push to main; on pull requests the build job skips the staging and
  # upload steps and this job is gated off entirely. Requires Settings -> Pages
  # -> Source: "GitHub Actions" to be enabled once for the repository.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
